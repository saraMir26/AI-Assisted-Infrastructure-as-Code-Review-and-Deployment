name: AI-Assisted IaC Review

on:
  pull_request:
    paths:
      - "**/*.tf"

permissions:
  contents: read
  pull-requests: write   # needed to post the PR comment
  models: read            # needed to call GitHub Models

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Run Checkov (baseline security scan)
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: true          # don't block the pipeline — findings feed the PR comment instead
          output_format: cli
          output_file_path: checkov_output.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AI reviewer (GitHub Models)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/ai_review.py main.tf

      - name: Post findings as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file ai_review_output.md